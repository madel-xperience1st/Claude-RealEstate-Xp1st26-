# ============================================
# PropHub API - Development Environment
# ============================================
# INSTRUCTIONS:
# 1. Copy this file and rename for your environment
# 2. Fill in your Salesforce Connected App credentials
# 3. NEVER commit real credentials to git
# 4. For CloudHub deployment, set these as secure properties
# ============================================

http:
  port: "8081"

# Salesforce Connection (OAuth 2.0 JWT Bearer via Connected App)
sf:
  consumer.key: "${SF_CONSUMER_KEY}"
  keystore.path: "${SF_KEYSTORE_PATH}"
  keystore.password: "${SF_KEYSTORE_PASSWORD}"
  username: "${SF_USERNAME}"

  # Demo user email (matched against Presales_User__mdt)
  demo.user.email: "${SF_DEMO_USER_EMAIL}"

# JWT Configuration (for PropHub mobile app token management)
jwt:
  secret: "${JWT_SECRET}"
  expiration: 3600

# Google OAuth (for production - optional for demo)
google:
  oauth.clientId: "${GOOGLE_CLIENT_ID}"

# Anypoint Platform (for API Manager autodiscovery)
anypoint:
  platform:
    client_id: "${ANYPOINT_CLIENT_ID}"
    client_secret: "${ANYPOINT_CLIENT_SECRET}"
